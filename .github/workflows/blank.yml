name: Automated API tests using Postman CLI

on:
  push:
  workflow_dispatch:

# Required for Azure OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    # Environment variables used across the workflow
    env:
      # Postman collection UID (from Postman Cloud)
      COLLECTION_ID: "53143593-7e1924ec-b718-4738-8f70-39fd7822fa06"

      # Postman environment UID (from Postman Cloud)
      ENVIRONMENT_ID: "53143593-0f782d40-e741-4411-877f-5d763330bdd6"

      # Azure Key Vault name (pre-mapped to this workspace)
      VAULT_NAME: "field-services-key-vault"

    steps:
      # Step 1: Checkout repository code (standard GitHub Actions step)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Authenticate GitHub Actions to Azure using OIDC
      # This avoids storing Azure credentials in GitHub
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # Step 3: Install required tools:
      # - jq: JSON parsing (optional but useful for debugging)
      # - python3: used to process environment and resolve secrets
      # - Postman CLI: used to run collections
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3
          curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      # Step 4: Authenticate Postman CLI using API key
      # This allows access to Postman Cloud collections and environments
      - name: Login to Postman CLI
        shell: bash
        run: |
          postman login --with-api-key "${{ secrets.POSTMAN_API_KEY }}"

      # Step 5: Fetch the environment definition from Postman Cloud
      # This contains variable definitions, including {{vault:...}} references
      - name: Fetch environment from Postman Cloud
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          curl --fail --silent --show-error \
            --location "https://api.getpostman.com/environments/${ENVIRONMENT_ID}" \
            --header "X-API-Key: ${POSTMAN_API_KEY}" \
            --output postman-cloud-environment.json

      # Step 6: Resolve vault-backed variables and run the collection
      # This step:
      # - Detects variables using {{vault:...}} syntax
      # - Retrieves their values from Azure Key Vault
      # - Injects them directly into the Postman CLI run via --env-var
      # - Avoids writing secrets to disk (no temp environment file)
      - name: Run collection with Azure Key Vault values injected at runtime
        shell: bash
        env:
          COLLECTION_ID: ${{ env.COLLECTION_ID }}
          ENVIRONMENT_ID: ${{ env.ENVIRONMENT_ID }}
          VAULT_NAME: ${{ env.VAULT_NAME }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          # Load environment variables from GitHub Actions
          collection_id = os.environ["COLLECTION_ID"]
          environment_id = os.environ["ENVIRONMENT_ID"]
          vault_name = os.environ["VAULT_NAME"]

          # Load Postman environment JSON fetched earlier
          with open("postman-cloud-environment.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          values = payload.get("environment", {}).get("values", [])

          # Regex to detect values like {{vault:apiKey}}
          pattern = re.compile(r"^\{\{vault:([^}]+)\}\}$")

          # Base Postman CLI command:
          # - runs collection directly via UID
          # - uses environment from Postman Cloud
          cmd = [
              "postman", "collection", "run",
              collection_id,
              "-e", environment_id,
              "--verbose"
          ]

          print(f"[INFO] Using Azure Key Vault: {vault_name}")

          # Iterate through all environment variables
          for item in values:
              key = item.get("key")
              value = item.get("value", "")

              # Check if variable uses {{vault:...}} syntax
              match = pattern.match(value) if isinstance(value, str) else None

              if not match:
                  print(f"[LOCAL] Variable '{key}' is not vault-backed")
                  continue

              # Extract secret name from {{vault:secretName}}
              secret_name = match.group(1).strip()

              if not secret_name:
                  sys.stderr.write(f"[ERROR] Variable '{key}' has an empty vault reference.\n")
                  sys.exit(1)

              print(f"[KEYVAULT] Resolving '{key}' from vault '{vault_name}' using secret '{secret_name}'")

              # Azure CLI call to retrieve secret value
              az_cmd = [
                  "az", "keyvault", "secret", "show",
                  "--vault-name", vault_name,
                  "--name", secret_name,
                  "--query", "value",
                  "-o", "tsv"
              ]

              result = subprocess.run(az_cmd, capture_output=True, text=True)

              if result.returncode != 0:
                  sys.stderr.write(f"[ERROR] Failed to resolve '{key}' from vault '{vault_name}'.\n")
                  sys.stderr.write(result.stderr)
                  sys.exit(result.returncode)

              secret_value = result.stdout.strip()

              # Mask secret so it never appears in logs
              print(f"::add-mask::{secret_value}")
              print(f"[SUCCESS] Variable '{key}' resolved from Azure Key Vault")

              # Inject resolved value into Postman CLI at runtime
              # This avoids writing secrets to disk
              cmd.extend(["--env-var", f"{key}={secret_value}"])

          # Execute Postman CLI with injected secrets
          completed = subprocess.run(cmd)
          sys.exit(completed.returncode)
          PY
