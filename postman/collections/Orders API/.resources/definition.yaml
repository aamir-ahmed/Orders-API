$kind: collection
description: >
  Design-stage API for managing commerce orders.


  ## Standard headers

  - **Idempotency-Key**: Optional for GET. Recommended for POST operations to
  safely retry requests.

  - **X-Correlation-Id**: Optional client-provided correlation ID for tracing
  across services.
variables:
  baseUrl: "{{baseUrl}}"
  regressionSuiteVersion: ""
  createOrderIdempotencyKey: ""
  createdOrderId: ""
scripts:
  - type: http:beforeRequest
    code: pm.collectionVariables.set("regressionSuiteVersion", "1.0");
    language: text/javascript
