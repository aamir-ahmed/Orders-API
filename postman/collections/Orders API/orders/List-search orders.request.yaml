$kind: http-request
name: List/search orders
url: "{{baseUrl}}/orders?status=CONFIRMED&customerId=cust_67890&createdFrom=196\
  7-01-09T23:52:44.717Z&createdTo=1967-01-09T23:52:44.717Z&limit=50&cursor=stri\
  ng"
method: GET
headers:
  - key: X-Correlation-Id
    value: string
    description: Client-provided correlation ID for request tracing.
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: CONFIRMED
    description: Filter by order status
  - key: customerId
    value: cust_67890
    description: Filter by customer ID
  - key: createdFrom
    value: 1967-01-09T23:52:44.717Z
    description: Filter by creation date (inclusive) in ISO-8601 format
  - key: createdTo
    value: 1967-01-09T23:52:44.717Z
    description: Filter by creation date (inclusive) in ISO-8601 format
  - key: limit
    value: "50"
    description: Max number of results to return
  - key: cursor
    value: string
    description: Opaque pagination cursor
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200 OK", () => {
          pm.response.to.have.status(200);
      });


      pm.test("Response Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response body is a valid JSON object", () => {
          pm.response.to.be.json;
      });


      pm.test("Response contains a data/items array", () => {
          const json = pm.response.json();
          // Accept either 'data' or 'items' as the array key
          const hasData = json.hasOwnProperty("data") && Array.isArray(json.data);
          const hasItems = json.hasOwnProperty("items") && Array.isArray(json.items);
          pm.expect(hasData || hasItems, "Response should have a 'data' or 'items' array").to.be.true;
      });


      pm.test("All returned orders have status DELIVERED", () => {
          const json = pm.response.json();
          const orders = json.data || json.items || [];
          orders.forEach((order, i) => {
              pm.expect(order.status, `Order at index ${i} should have status DELIVERED`).to.equal("CONFIRMED");
          });
      });


      pm.test("Response contains pagination metadata", () => {
          const json = pm.response.json();
          // Accept common pagination shapes
          const hasMeta = json.hasOwnProperty("meta") || json.hasOwnProperty("pagination") || json.hasOwnProperty("cursor") || json.hasOwnProperty("nextCursor");
          pm.expect(hasMeta, "Response should contain pagination metadata").to.be.true;
      });


      pm.test("Response time is under 3000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });
    language: text/javascript
examples: ./.resources/List-search orders.resources/examples
order: 3000
