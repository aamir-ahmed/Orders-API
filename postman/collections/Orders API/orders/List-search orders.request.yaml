$kind: http-request
name: List/search orders
url: "{{baseUrl}}/orders?status=CONFIRMED&customerId=string&createdFrom=1996-08\
  -18T12:45:24.464Z&createdTo=1996-08-18T12:45:24.464Z&limit=50&cursor=string"
method: GET
headers:
  - key: X-Correlation-Id
    value: "{{$randomUUID}}"
    description: Optional tracking ID. Share with support to help trace this request.
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: CONFIRMED
    description: Filter by order status
  - key: customerId
    value: string
    description: Filter by customer ID
  - key: createdFrom
    value: 1996-08-18T12:45:24.464Z
    description: Filter by creation date (inclusive) in ISO-8601 format
  - key: createdTo
    value: 1996-08-18T12:45:24.464Z
    description: Filter by creation date (inclusive) in ISO-8601 format
  - key: limit
    value: "50"
    description: Max number of results to return
  - key: cursor
    value: string
    description: Opaque pagination cursor
scripts:
