$kind: http-example
request:
  url: "{{baseUrl}}/orders/:orderId/cancel"
  method: POST
  headers:
    - key: Idempotency-Key
      value: string
      description: >
        A unique key (typically a UUID) that the client provides to make a
        request idempotent.

        Repeating a request with the same key should not create duplicate
        resources.
    - key: X-Correlation-Id
      value: string
      description: Client-provided correlation ID for request tracing.
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  pathVariables:
    - key: orderId
      value: string
      description: Order identifier
  body:
    type: json
    content: |-
      {
        "reason": "Partner requested cancellation."
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "INVALID_REQUEST",
        "message": "One or more fields are invalid.",
        "correlationId": "string",
        "details": [
          {
            "field": "string",
            "issue": "string"
          },
          {
            "field": "string",
            "issue": "string"
          }
        ]
      }
order: 4000
