$kind: http-example
request:
  url: "{{baseUrl}}/orders/:orderId/cancel"
  method: POST
  headers:
    - key: Idempotency-Key
      value: string
      description: >
        A unique key (typically a UUID) that the client provides to make a
        request idempotent.

        Repeating a request with the same key should not create duplicate
        resources.
    - key: X-Correlation-Id
      value: string
      description: Client-provided correlation ID for request tracing.
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  pathVariables:
    - key: orderId
      value: string
      description: Order identifier
  body:
    type: json
    content: |-
      {
        "reason": "Partner requested cancellation."
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "CONFLICT",
        "message": "Order cannot be canceled in its current status.",
        "correlationId": "corr_abc123"
      }
order: 3000
