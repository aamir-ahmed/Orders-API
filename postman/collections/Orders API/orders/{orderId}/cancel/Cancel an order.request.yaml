$kind: http-request
description: |
  Requests cancellation for an order.

  - If the order is already shipped/delivered, cancellation may be rejected.
  - This operation is idempotent when using **Idempotency-Key**.
url: "{{baseUrl}}/orders/:orderId/cancel"
method: POST
headers:
  - key: Idempotency-Key
    value: "{{$randomUUID}}"
    description: Recommended for safe retries. Reuse the same value if you retry the
      same cancel request.
  - key: X-Correlation-Id
    value: "{{$randomUUID}}"
    description: Optional tracking ID. Share with support to help trace this request.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: string
    description: Order identifier
body:
  type: json
  content: |-
    {
      "reason": "Partner requested cancellation."
    }
examples: ./.resources/Cancel an order.resources/examples
order: 1000
