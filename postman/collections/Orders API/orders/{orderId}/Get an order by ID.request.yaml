$kind: http-request
url: "{{baseUrl}}/orders/:orderId"
method: GET
headers:
  - key: X-Correlation-Id
    value: "{{$randomUUID}}"
    description: Optional tracking ID. Share with support to help trace this request.
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: string
    description: Order identifier
examples: ./.resources/Get an order by ID.resources/examples
order: 3000
