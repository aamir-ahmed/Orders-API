$kind: http-request
url: http://{{baseUrl}}/orders/:orderId
method: GET
headers:
  - key: X-Correlation-Id
    value: string
    description: Client-provided correlation ID for request tracing.
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: string
    description: Order identifier
body:
  type: text
  content: ""
examples: ./.resources/Get an order by ID.resources/examples
order: 1000
