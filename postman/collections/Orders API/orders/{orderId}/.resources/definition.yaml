$kind: collection
description: >
  Operations scoped to a specific order (`:orderId`).


  ## Requests in this folder

  - **Get an order by ID** (`GET {{baseUrl}}/orders/:orderId`)


  ## Subfolders

  - **cancel**: Cancel a specific order (`POST
  {{baseUrl}}/orders/:orderId/cancel`)

  - **events**: Retrieve event history for a specific order (`GET
  {{baseUrl}}/orders/:orderId/events`)
