$kind: http-example
request:
  url: http://{{baseUrl}}/orders/:orderId
  method: GET
  headers:
    - key: X-Correlation-Id
      value: string
      description: Client-provided correlation ID for request tracing.
    - key: Accept
      value: application/json
  pathVariables:
    - key: orderId
      value: string
      description: Order identifier
  body:
    type: text
    content: ""
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "INVALID_REQUEST",
        "message": "One or more fields are invalid.",
        "correlationId": "string",
        "details": [
          {
            "field": "string",
            "issue": "string"
          },
          {
            "field": "string",
            "issue": "string"
          }
        ]
      }
order: 3000
