$kind: http-request
url: "{{baseUrl}}/orders/:orderId/events?limit=50&cursor=string"
method: GET
headers:
  - key: X-Correlation-Id
    value: "{{$randomUUID}}"
    description: Optional tracking ID. Share with support to help trace this request.
  - key: Accept
    value: application/json
queryParams:
  - key: limit
    value: "50"
    description: Max number of results to return
  - key: cursor
    value: string
    description: Opaque pagination cursor
pathVariables:
  - key: orderId
    value: string
    description: Order identifier
examples: ./.resources/Get order events.resources/examples
order: 1000
