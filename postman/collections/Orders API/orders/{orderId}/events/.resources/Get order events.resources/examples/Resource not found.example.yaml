$kind: http-example
request:
  url: "{{baseUrl}}/orders/:orderId/events?value=reference
    %23/components/schemas/Cursor not found in the OpenAPI spec"
  method: GET
  headers:
    - key: X-Correlation-Id
      value: string
      description: Client-provided correlation ID for request tracing.
    - key: Accept
      value: application/json
  queryParams:
    - key: value
      value: "reference #/components/schemas/Cursor not found in the OpenAPI spec"
      description: Max number of results to return
  pathVariables:
    - key: orderId
      value: string
      description: Order identifier
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "NOT_FOUND",
        "message": "Order not found.",
        "correlationId": "corr_abc123"
      }
order: 2000
