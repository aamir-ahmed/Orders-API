$kind: http-example
request:
  url: "{{baseUrl}}/orders/:orderId/events"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: orderId
      value: string
      description: Order identifier
  body:
    type: text
    content: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "NOT_FOUND",
        "message": "Order not found.",
        "correlationId": "corr_abc123"
      }
order: 2000
