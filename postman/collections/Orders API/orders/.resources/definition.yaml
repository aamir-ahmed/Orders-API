$kind: collection
description: >-
  This folder contains the **collection-level** **`/orders`** **endpoints** used
  to create new orders and to retrieve lists of orders.


  ## Requests in this folder


  - **Create an order** (`POST {{baseUrl}}/orders`): Create a new order.
      
  - **List/search orders** (`GET {{baseUrl}}/orders`): List orders with optional
  filters (for example `status`, `customerId`, `createdFrom`, `createdTo`) and
  pagination (`limit`, `cursor`).
      

  ## Typical workflow


  1. **Create** an order with `POST /orders`.
      
  2. **List/search** orders with `GET /orders` to find orders matching criteria.
order: 1000
