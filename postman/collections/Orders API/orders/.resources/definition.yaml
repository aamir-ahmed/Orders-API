$kind: collection
description: >-
  Manage orders from start to finish.


  Use the requests in this folder to **create an order** or **find existing
  orders**.


  **Standard headers (optional but recommended)**

  - **Idempotency-Key**: A unique value you generate when creating an order. If
  you need to retry the same create request (for example, a timeout), reuse the
  same key so you don’t create duplicates.

  - **X-Correlation-Id**: A tracking ID you generate and send with the request.
  Share it with support so they can quickly find your request in logs.


  **Base URL**: `{{baseUrl}}`
order: 1000
