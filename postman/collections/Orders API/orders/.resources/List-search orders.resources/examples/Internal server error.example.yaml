$kind: http-example
request:
  url: "{{baseUrl}}/orders?status=CONFIRMED&customerId=string&createdFrom=1996-08\
    -18T12:45:24.464Z&createdTo=1996-08-18T12:45:24.464Z&limit=50&cursor=string"
  method: GET
  headers:
    - key: X-Correlation-Id
      value: string
      description: Client-provided correlation ID for request tracing.
    - key: Accept
      value: application/json
  queryParams:
    - key: status
      value: CONFIRMED
      description: Filter by order status
    - key: customerId
      value: string
      description: Filter by customer ID
    - key: createdFrom
      value: 1996-08-18T12:45:24.464Z
      description: Filter by creation date (inclusive) in ISO-8601 format
    - key: createdTo
      value: 1996-08-18T12:45:24.464Z
      description: Filter by creation date (inclusive) in ISO-8601 format
    - key: limit
      value: "50"
      description: Max number of results to return
    - key: cursor
      value: string
      description: Opaque pagination cursor
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "INVALID_REQUEST",
        "message": "One or more fields are invalid.",
        "correlationId": "string",
        "details": [
          {
            "field": "string",
            "issue": "string"
          },
          {
            "field": "string",
            "issue": "string"
          }
        ]
      }
order: 3000
