$kind: http-example
request:
  url: "{{baseUrl}}/orders?status=DELIVERED&customerId=cust_67890&createdFrom=196\
    7-01-09T23:52:44.717Z&createdTo=1967-01-09T23:52:44.717Z&limit=50&cursor=st\
    ring"
  method: GET
  headers:
    - key: X-Correlation-Id
      value: string
      description: Client-provided correlation ID for request tracing.
    - key: Accept
      value: application/json
  queryParams:
    - key: status
      value: DELIVERED
      description: Filter by order status
    - key: customerId
      value: cust_67890
      description: Filter by customer ID
    - key: createdFrom
      value: 1967-01-09T23:52:44.717Z
      description: Filter by creation date (inclusive) in ISO-8601 format
    - key: createdTo
      value: 1967-01-09T23:52:44.717Z
      description: Filter by creation date (inclusive) in ISO-8601 format
    - key: limit
      value: "50"
      description: Max number of results to return
    - key: cursor
      value: string
      description: Opaque pagination cursor
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "INVALID_REQUEST",
        "message": "One or more fields are invalid.",
        "correlationId": "string",
        "details": [
          {
            "field": "string",
            "issue": "string"
          },
          {
            "field": "string",
            "issue": "string"
          }
        ]
      }
order: 3000
