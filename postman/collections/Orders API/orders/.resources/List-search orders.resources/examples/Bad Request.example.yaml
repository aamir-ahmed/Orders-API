$kind: http-example
request:
  url: "{{baseUrl}}/orders?status=CONFIRMED&customerId=cust_67890"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: status
      value: CONFIRMED
      description: Filter by order status
    - key: customerId
      value: cust_67890
      description: Filter by customer ID
  body:
    type: text
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "INVALID_REQUEST",
        "message": "One or more fields are invalid.",
        "correlationId": "corr_abc123",
        "details": [
          {
            "field": "createdFrom",
            "issue": "Must be an ISO-8601 date-time."
          }
        ]
      }
order: 2000
