$kind: http-example
request:
  url: "{{baseUrl}}/orders"
  method: POST
  headers:
    - key: Idempotency-Key
      value: string
      disabled: true
      description: >
        A unique key (typically a UUID) that the client provides to make a
        request idempotent.

        Repeating a request with the same key should not create duplicate
        resources.
    - key: X-Correlation-Id
      value: string
      disabled: true
      description: Client-provided correlation ID for request tracing.
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  body:
    type: json
    content: |-
      {
        "customerId": "cust_67890",
        "currency": "USD",
        "items": [
          {
            "sku": "HP-LJ-MFP-M234SDW",
            "quantity": 1
          },
          {
            "sku": "W1470A",
            "quantity": 2
          }
        ],
        "shippingAddress": {
          "line1": "1501 Page Mill Rd",
          "city": "Palo Alto",
          "region": "CA",
          "postalCode": "94304",
          "country": "US"
        },
        "billingAddress": {
          "line1": "1501 Page Mill Rd",
          "city": "Palo Alto",
          "region": "CA",
          "postalCode": "94304",
          "country": "US"
        },
        "notes": "Partner order submission.",
        "metadata": {
          "partnerId": "prt_13579",
          "channel": "PARTNER",
          "purchaseOrderNumber": "PO-1000456"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
    X-Correlation-Id: ""
  body:
    type: json
    content: |-
      {
        "code": "INVALID_REQUEST",
        "message": "One or more fields are invalid.",
        "correlationId": "string",
        "details": [
          {
            "field": "string",
            "issue": "string"
          },
          {
            "field": "string",
            "issue": "string"
          }
        ]
      }
order: 4000
