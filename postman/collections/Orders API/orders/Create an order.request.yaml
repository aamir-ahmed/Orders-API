$kind: http-request
url: "{{baseUrl}}/orders"
method: POST
headers:
  - key: X-Idempotency-Key
    value: "{{$randomUUID}}"
    description: >
      A unique key (typically a UUID) that the client provides to make a request
      idempotent.

      Repeating a request with the same key should not create duplicate
      resources.
  - key: X-Correlation-Id
    value: "{{$randomUUID}}"
    description: Client-provided correlation ID for request tracing.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "cust_12345",
      "currency": "USD",
      "items": [
        {
          "sku": "TSHIRT-BLACK-M",
          "quantity": 1
        }
      ],
      "shippingAddress": {
        "line1": "1501 Page Mill Rd",
        "city": "Palo Alto",
        "region": "CA",
        "postalCode": "94304",
        "country": "US"
      },
      "billingAddress": {
        "line1": "1501 Page Mill Rd",
        "city": "Palo Alto",
        "region": "CA",
        "postalCode": "94304",
        "country": "US"
      },
      "notes": "Partner order submission.",
      "metadata": {
        "partnerId": "prt_13579",
        "channel": "PARTNER",
        "purchaseOrderNumber": "PO-1000456"
      }
    }
scripts:
  - type: beforeRequest
    code: >-
      // Generate a fresh idempotency key for each run

      pm.collectionVariables.set("createOrderIdempotencyKey",
      pm.variables.replaceIn("{{$randomUUID}}"));
    language: text/javascript
  - type: afterResponse
    code: >-
      const conformanceTest =
      pm.require('@field-services-v12-demo/conformance-test');

      conformanceTest.runConformanceTests();


      pm.test("Status code is 201 Created", () => {
          pm.response.to.have.status(201);
      });


      pm.test("Response Content-Type is application/json", () => {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response body is a valid JSON object", () => {
          pm.response.to.be.json;
      });


      pm.test("Response contains an order ID", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("id");
          pm.expect(json.id).to.be.a("string").and.not.empty;
          // Store for downstream requests
          pm.collectionVariables.set("createdOrderId", json.id);
      });


      pm.test("Response contains status field", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("status");
          pm.expect(json.status).to.be.a("string").and.not.empty;
      });


      pm.test("Response contains items array", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("items").that.is.an("array").with.lengthOf.at.least(1);
      });


      pm.test("Response time is under 3000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });
    language: text/javascript
    packages:
      "@field-services-v12-demo/conformance-test":
        id: 019cc120-c8d5-7281-80d1-64e0193142e5
examples: ./.resources/Create an order.resources/examples
order: 2000
