$kind: http-request
url: "{{baseUrl}}/orders"
method: POST
headers:
  - key: Idempotency-Key
    value: "{{$randomUUID}}"
    description: Recommended for safe retries. Reuse the same value if you retry the
      same create request to avoid duplicate orders.
  - key: X-Correlation-Id
    value: "{{$randomUUID}}"
    description: Optional tracking ID. Share with support to help trace this request.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "cust_12345",
      "items": [
        {
          "sku": "TSHIRT-BLACK-M",
          "quantity": 1
        }
      ],
      "currency": "USD"
    }
examples: ./.resources/Create an order.resources/examples
order: 2000
