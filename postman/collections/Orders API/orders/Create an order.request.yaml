$kind: http-request
url: http://{{baseUrl}}/orders
method: POST
headers:
  - key: Idempotency-Key
    value: string
    description: >
      A unique key (typically a UUID) that the client provides to make a request
      idempotent.

      Repeating a request with the same key should not create duplicate
      resources.
  - key: X-Correlation-Id
    value: string
    description: Client-provided correlation ID for request tracing.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "cust_67890",
      "currency": "USD",
      "items": [
        {
          "sku": "HP-LJ-MFP-M234SDW",
          "quantity": 1
        },
        {
          "sku": "W1470A",
          "quantity": 2
        }
      ],
      "shippingAddress": {
        "line1": "1501 Page Mill Rd",
        "city": "Palo Alto",
        "region": "CA",
        "postalCode": "94304",
        "country": "US"
      },
      "billingAddress": {
        "line1": "1501 Page Mill Rd",
        "city": "Palo Alto",
        "region": "CA",
        "postalCode": "94304",
        "country": "US"
      },
      "notes": "Partner order submission.",
      "metadata": {
        "partnerId": "prt_13579",
        "channel": "PARTNER",
        "purchaseOrderNumber": "PO-1000456"
      }
    }
examples: ./.resources/Create an order.resources/examples
order: 1000
