openapi: 3.0.3
info:
  title: Orders API
  version: 0.1.0
  description: |
    Design-stage API for managing commerce orders.

    ## Standard headers
    - **X-Idempotency-Key**: Optional for GET. Recommended for POST operations to safely retry requests.
    - **X-Correlation-Id**: Optional client-provided correlation ID for tracing across services.
servers:
  - url: 'http://api.orders.local'
    description: Placeholder server (design stage)
tags:
  - name: Orders
    description: Create, retrieve, list/search, cancel orders, and retrieve order events.
paths:
  /orders:
    post:
      tags: [Orders]
      summary: Create an order
      description: Secured endpoint (auth required), but 401/403 responses are not defined.
      operationId: createOrder
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XCorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            examples:
              create-order:
                summary: Create order request
                value:
                  customerId: cust_67890
                  currency: USD
                  items:
                    - sku: HP-LJ-MFP-M234SDW
                      quantity: 1
                    - sku: W1470A
                      quantity: 2
                  shippingAddress:
                    line1: 1501 Page Mill Rd
                    city: Palo Alto
                    region: CA
                    postalCode: '94304'
                    country: US
                  billingAddress:
                    line1: 1501 Page Mill Rd
                    city: Palo Alto
                    region: CA
                    postalCode: '94304'
                    country: US
                  notes: Partner order submission.
                  metadata:
                    partnerId: prt_13579
                    channel: PARTNER
                    purchaseOrderNumber: PO-1000456
      responses:
        '201':
          description: Order created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: ord_12345
                customerId: cust_67890
                status: PENDING
                items:
                  - sku: HP-LJ-MFP-M234SDW
                    name: HP LaserJet MFP M234sdw
                    quantity: 1
                    unitPrice:
                      currency: USD
                      amount: 24999
                    totalPrice:
                      currency: USD
                      amount: 24999
                  - sku: W1470A
                    name: HP 147A Black Toner Cartridge
                    quantity: 2
                    unitPrice:
                      currency: USD
                      amount: 10999
                    totalPrice:
                      currency: USD
                      amount: 21998
                shippingAddress:
                  line1: 1501 Page Mill Rd
                  city: Palo Alto
                  region: CA
                  postalCode: '94304'
                  country: US
                billingAddress:
                  line1: 1501 Page Mill Rd
                  city: Palo Alto
                  region: CA
                  postalCode: '94304'
                  country: US
                subtotal:
                  currency: USD
                  amount: 46997
                tax:
                  currency: USD
                  amount: 3759
                shipping:
                  currency: USD
                  amount: 1299
                total:
                  currency: USD
                  amount: 52055
                createdAt: '2026-03-13T10:00:00Z'
                updatedAt: '2026-03-13T10:05:00Z'
                metadata:
                  partnerId: prt_13579
                  channel: PARTNER
                  purchaseOrderNumber: PO-1000456
        '400':
          description: Bad Request
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: INVALID_REQUEST
                message: One or more fields are invalid.
                correlationId: corr_abc123
                details:
                  - field: items[1].quantity
                    issue: Must be greater than or equal to 1.
        '409':
          description: Conflict
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: CONFLICT
                message: An order with the same idempotency key already exists.
                correlationId: corr_abc123
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Orders]
      summary: List/search orders
      operationId: listOrders
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - name: status
          in: query
          description: Filter by order status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: customerId
          in: query
          description: Filter by customer ID
          schema:
            $ref: '#/components/schemas/CustomerId'
        - name: createdFrom
          in: query
          description: Filter by creation date (inclusive) in ISO-8601 format
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          description: Filter by creation date (inclusive) in ISO-8601 format
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Max number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          description: Opaque pagination cursor
          schema:
            type: string
      responses:
        '200':
          description: A list of orders
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
            X-Next-Cursor:
              description: Opaque cursor to fetch the next page (if any)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
              example:
                items:
                  - id: ord_12345
                    customerId: cust_67890
                    status: CONFIRMED
                    items:
                      - sku: HP-LJ-MFP-M234SDW
                        name: HP LaserJet MFP M234sdw
                        quantity: 1
                        unitPrice:
                          currency: USD
                          amount: 24999
                        totalPrice:
                          currency: USD
                          amount: 24999
                      - sku: W1470A
                        name: HP 147A Black Toner Cartridge
                        quantity: 2
                        unitPrice:
                          currency: USD
                          amount: 10999
                        totalPrice:
                          currency: USD
                          amount: 21998
                    subtotal:
                      currency: USD
                      amount: 46997
                    tax:
                      currency: USD
                      amount: 3759
                    shipping:
                      currency: USD
                      amount: 1299
                    total:
                      currency: USD
                      amount: 52055
                    createdAt: '2026-03-13T10:00:00Z'
                    updatedAt: '2026-03-13T10:05:00Z'
                    metadata:
                      partnerId: prt_13579
                      channel: PARTNER
                      purchaseOrderNumber: PO-1000456
                nextCursor: cursor_next_001
        '400':
          description: Bad Request
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: INVALID_REQUEST
                message: One or more fields are invalid.
                correlationId: corr_abc123
                details:
                  - field: createdFrom
                    issue: Must be an ISO-8601 date-time.
        '500':
          $ref: '#/components/responses/InternalServerError'
  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get an order by ID
      description: Secured endpoint (auth required), but 401/403 responses are not defined.
      operationId: getOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Order found
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: ord_12345
                customerId: cust_67890
                status: CONFIRMED
                items:
                  - sku: HP-LJ-MFP-M234SDW
                    name: HP LaserJet MFP M234sdw
                    quantity: 1
                    unitPrice:
                      currency: USD
                      amount: 24999
                    totalPrice:
                      currency: USD
                      amount: 24999
                  - sku: W1470A
                    name: HP 147A Black Toner Cartridge
                    quantity: 2
                    unitPrice:
                      currency: USD
                      amount: 10999
                    totalPrice:
                      currency: USD
                      amount: 21998
                shippingAddress:
                  line1: 1501 Page Mill Rd
                  city: Palo Alto
                  region: CA
                  postalCode: '94304'
                  country: US
                billingAddress:
                  line1: 1501 Page Mill Rd
                  city: Palo Alto
                  region: CA
                  postalCode: '94304'
                  country: US
                subtotal:
                  currency: USD
                  amount: 46997
                tax:
                  currency: USD
                  amount: 3759
                shipping:
                  currency: USD
                  amount: 1299
                total:
                  currency: USD
                  amount: 52055
                createdAt: '2026-03-13T10:00:00Z'
                updatedAt: '2026-03-13T10:05:00Z'
                metadata:
                  partnerId: prt_13579
                  channel: PARTNER
                  purchaseOrderNumber: PO-1000456
        '404':
          description: Resource not found
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: NOT_FOUND
                message: Order not found.
                correlationId: corr_abc123
        '500':
          $ref: '#/components/responses/InternalServerError'
  /orders/{orderId}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order
      operationId: cancelOrder
      description: |
        Requests cancellation for an order.

        - If the order is already shipped/delivered, cancellation may be rejected.
        - This operation is idempotent when using **Idempotency-Key**.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XCorrelationId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
            examples:
              cancel-order:
                summary: Cancel order request
                value:
                  reason: Partner requested cancellation.
      responses:
        '200':
          description: Order cancelled (or already cancelled)
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: ord_12345
                customerId: cust_67890
                status: cancelled
                items:
                  - sku: HP-LJ-MFP-M234SDW
                    name: HP LaserJet MFP M234sdw
                    quantity: 1
                    unitPrice:
                      currency: USD
                      amount: 24999
                    totalPrice:
                      currency: USD
                      amount: 24999
                  - sku: W1470A
                    name: HP 147A Black Toner Cartridge
                    quantity: 2
                    unitPrice:
                      currency: USD
                      amount: 10999
                    totalPrice:
                      currency: USD
                      amount: 21998
                subtotal:
                  currency: USD
                  amount: 46997
                tax:
                  currency: USD
                  amount: 3759
                shipping:
                  currency: USD
                  amount: 1299
                total:
                  currency: USD
                  amount: 52055
                createdAt: '2026-03-13T10:00:00Z'
                updatedAt: '2026-03-13T10:05:00Z'
                cancelledAt: '2026-03-13T10:06:00Z'
                metadata:
                  partnerId: prt_13579
                  channel: PARTNER
                  purchaseOrderNumber: PO-1000456
        '404':
          description: Resource not found
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: NOT_FOUND
                message: Order not found.
                correlationId: corr_abc123
        '409':
          description: Conflict
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: CONFLICT
                message: Order cannot be cancelled in its current status.
                correlationId: corr_abc123
        '500':
          $ref: '#/components/responses/InternalServerError'
  /orders/{orderId}/events:
    get:
      tags: [Orders]
      summary: Get order events
      operationId: getOrderEvents
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: limit
          in: query
          description: Max number of results to return
          schema:
            $ref: '#/components/schemas/Limit'
        - name: cursor
          in: query
          description: Opaque pagination cursor
          schema:
            $ref: '#/components/schemas/Cursor'
      responses:
        '200':
          description: A list of events for the order
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
            X-Next-Cursor:
              description: Opaque cursor to fetch the next page (if any)
              schema:
                $ref: '#/components/schemas/Cursor'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEventListResponse'
              example:
                items:
                  - id: evt_0001
                    orderId: ord_12345
                    type: CREATED
                    occurredAt: '2026-03-13T10:00:00Z'
                    actor: system
                    details:
                      note: Order created.
                      partnerId: prt_13579
                      channel: PARTNER
                      purchaseOrderNumber: PO-1000456
                  - id: evt_0002
                    orderId: ord_12345
                    type: CONFIRMED
                    occurredAt: '2026-03-13T10:01:00Z'
                    actor: system
                    details:
                      note: Order confirmed.
                  - id: evt_0003
                    orderId: ord_12345
                    type: CANCELLED
                    occurredAt: '2026-03-13T10:06:00Z'
                    actor: system
                    details:
                      note: Order cancelled.
                nextCursor: cursor_next_evt_001
        '404':
          description: Resource not found
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: NOT_FOUND
                message: Order not found.
                correlationId: corr_abc123
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      description: Order identifier
      schema:
        type: string
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      description: |
        A unique key (typically a UUID) that the client provides to make a request idempotent.
        Repeating a request with the same key should not create duplicate resources.
      schema:
        type: string
        maxLength: 128
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Client-provided correlation ID for request tracing.
      schema:
        type: string
        maxLength: 128
  headers:
    XCorrelationId:
      description: Correlation ID for request tracing.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/XCorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/XCorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/XCorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/XCorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    CustomerId:
      type: string
      description: Customer identifier
      example: cust_67890
    CancelOrderRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Optional reason for cancellation
    OrderListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        nextCursor:
          type: string
          description: Convenience field mirroring X-Next-Cursor
    OrderEventListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderEvent'
        nextCursor:
          type: string
    OrderStatus:
      type: string
      description: Order lifecycle status
      enum: [PENDING, CONFIRMED, ALLOCATED, SHIPPED, DELIVERED, CANCELLED]
    Money:
      type: object
      additionalProperties: false
      required: [currency, amount]
      properties:
        currency:
          type: string
          description: ISO 4217 currency code
          example: USD
          minLength: 3
          maxLength: 3
        amount:
          type: integer
          description: Amount in minor units (e.g., cents)
          example: 1299
    Address:
      type: object
      additionalProperties: false
      required: [line1, city, region, postalCode, country]
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        region:
          type: string
          description: State/Province/Region
        postalCode:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: US
          minLength: 2
          maxLength: 2
    OrderItem:
      type: object
      additionalProperties: false
      required: [sku, name, quantity, unitPrice, totalPrice]
      properties:
        sku:
          type: string
        name:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          $ref: '#/components/schemas/Money'
        totalPrice:
          $ref: '#/components/schemas/Money'
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key/value metadata
    Order:
      type: object
      additionalProperties: false
      required: [id, status, items, subtotal, total, createdAt]
      properties:
        id:
          type: string
          description: Order identifier
        customerId:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        billingAddress:
          $ref: '#/components/schemas/Address'
        subtotal:
          $ref: '#/components/schemas/Money'
        tax:
          $ref: '#/components/schemas/Money'
        shipping:
          $ref: '#/components/schemas/Money'
        total:
          $ref: '#/components/schemas/Money'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string
    CreateOrderRequest:
      type: object
      additionalProperties: false
      required: [customerId, items, currency, shippingAddress]
      properties:
        customerId:
          type: string
        currency:
          type: string
          description: ISO 4217 currency code used for pricing
          minLength: 3
          maxLength: 3
          example: USD
        items:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [sku, quantity]
            properties:
              sku:
                type: string
              quantity:
                type: integer
                minimum: 1
        shippingAddress:
          $ref: '#/components/schemas/Address'
        billingAddress:
          $ref: '#/components/schemas/Address'
        notes:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    OrderEventType:
      type: string
      enum: [CREATED, CONFIRMED, ALLOCATED, SHIPPED, DELIVERED, CANCELLED]
    OrderEvent:
      type: object
      additionalProperties: false
      required: [id, orderId, type, occurredAt]
      properties:
        id:
          type: string
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/OrderEventType'
        occurredAt:
          type: string
          format: date-time
        actor:
          type: string
          description: System/user that caused the event
        details:
          type: object
          additionalProperties: true
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable, machine-readable error code
          example: INVALID_REQUEST
        message:
          type: string
          description: Human-readable error message
          example: One or more fields are invalid.
        correlationId:
          type: string
          description: Correlation ID for troubleshooting
        details:
          type: array
          description: Optional list of validation or domain errors
          items:
            type: object
            additionalProperties: false
            required: [field, issue]
            properties:
              field:
                type: string
              issue:
                type: string
